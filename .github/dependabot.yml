# Dependabot keeps the project's external dependencies up to date by
# opening PRs against this repo when new versions are released. See
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# for the full schema.

version: 2
updates:
  # Swift Package Manager — picks up `Package.swift` at the repo root.
  # `swift` is the correct ecosystem identifier (added in 2024 with
  # native SPM support).
  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"

  # GitHub Actions — watches `.github/workflows/*.yml`. Harmless when
  # there are no workflows yet; ready to track action versions as soon
  # as CI is added.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"
