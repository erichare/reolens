name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Single concurrency group per ref — when a new commit lands on a PR we
# cancel the older still-running job rather than burning macOS minutes
# on stale code.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Swift Package Manager build + tests with coverage. The package is the
  # source of truth for the libraries (ReolinkAPI / ReolinkStreaming /
  # ReolinkBaichuan) and their tests, so this is the workflow's anchor
  # job — the others are best-effort signals layered on top.
  build-test:
    name: Build & test (Swift Package)
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      # Xcode 16 ships Swift 6.0+, which Package.swift requires
      # (`swift-tools-version: 6.0`). The runner image rotates available
      # Xcodes, so we pin to a major version rather than a build number
      # to stay green when Apple refreshes the image.
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Print toolchain
        run: |
          swift --version
          xcodebuild -version

      # Cache the SPM build dir keyed on Package.swift / Package.resolved
      # so the second-and-later runs skip module rebuilds.
      - name: Cache .build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build (debug)
        run: swift build -c debug --enable-code-coverage

      - name: Run tests with coverage
        run: swift test --enable-code-coverage --parallel

      # Generate an LCOV report from the test profdata. Uploaded as an
      # artifact so we can drop it into a coverage service later (or
      # just inspect it locally from a PR).
      - name: Generate coverage report
        run: |
          set -euo pipefail
          PROFDATA=$(find .build -name 'default.profdata' | head -n 1)
          if [ -z "$PROFDATA" ]; then
            echo "No profdata found — skipping coverage report."
            exit 0
          fi
          # On macOS the SPM test bundle is a directory (`.xctest`) and
          # the Mach-O the profiler instrumented lives at
          # `<Bundle>.xctest/Contents/MacOS/<Name>`. Resolve to that
          # inner binary before feeding it to llvm-cov.
          BUNDLE=$(find .build -type d -name '*PackageTests.xctest' | head -n 1)
          if [ -z "$BUNDLE" ]; then
            echo "No test bundle found — skipping coverage report."
            exit 0
          fi
          BIN="$BUNDLE/Contents/MacOS/$(basename "$BUNDLE" .xctest)"
          if [ ! -f "$BIN" ]; then
            echo "Resolved binary $BIN doesn't exist — skipping coverage report."
            exit 0
          fi
          xcrun llvm-cov export -format=lcov \
            -instr-profile "$PROFDATA" "$BIN" \
            > coverage.lcov
          xcrun llvm-cov report \
            -instr-profile "$PROFDATA" "$BIN" \
            -ignore-filename-regex '\.build|Tests' | tee coverage-summary.txt
        continue-on-error: true

      - name: Upload coverage artifact
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            coverage.lcov
            coverage-summary.txt
          if-no-files-found: ignore

  # App-bundle assembly. The Mac app is built outside Xcode via
  # `Scripts/build-app.sh`, which wraps the SPM build into a proper
  # `.app` with Info.plist + entitlements. CI runs the same script the
  # developer runs locally so "works on my machine" stays honest.
  app-build:
    name: Assemble .app bundle
    runs-on: macos-15
    timeout-minutes: 20
    needs: build-test

    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Cache .build
        uses: actions/cache@v5
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved', 'Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Build app bundle
        run: ./Scripts/build-app.sh

      # Diagnostic dump of the built .app *before* trying to launch it.
      # On the previous failed CI run the app trapped before printing
      # anything, before macOS wrote a crash report — meaning the trap
      # was during dyld load / static initialization, not in our code.
      # These diagnostics tell us what dyld was trying to do.
      - name: Pre-launch app diagnostics
        run: |
          set +e
          echo "==> codesign on main binary"
          codesign -dvvv Reolens.app 2>&1 | head -20
          echo "==> codesign on Sparkle.framework"
          codesign -dvvv Reolens.app/Contents/Frameworks/Sparkle.framework 2>&1 | head -10
          echo "==> entitlements"
          codesign -d --entitlements :- Reolens.app 2>&1 | head -30
          echo "==> linked libraries (otool -L)"
          otool -L Reolens.app/Contents/MacOS/Reolens | head -30
          echo "==> rpaths (otool -l | LC_RPATH)"
          otool -l Reolens.app/Contents/MacOS/Reolens | grep -A2 LC_RPATH
          echo "==> Sparkle.framework contents"
          ls -la Reolens.app/Contents/Frameworks/Sparkle.framework/Versions/B/
          echo "==> spctl assessment"
          spctl -a -vv -t execute Reolens.app 2>&1 || true
          echo "==> macOS version"
          sw_vers
          echo "==> Xcode version"
          xcodebuild -version

      - name: Smoke-test launch
        run: |
          set -uo pipefail
          OUT=$(mktemp)
          EXIT=0
          # DYLD_PRINT_LIBRARIES traces every dylib dyld attempts to load
          # (and where from) — if Sparkle.framework or one of its
          # dependencies fails to map, the last printed line tells us
          # exactly where it died.
          export DYLD_PRINT_LIBRARIES=1
          export DYLD_PRINT_RPATHS=1
          export DYLD_PRINT_BINDINGS=1
          if command -v gtimeout >/dev/null 2>&1; then
            gtimeout 30s ./Reolens.app/Contents/MacOS/Reolens --smoke-test >"${OUT}" 2>&1 || EXIT=$?
          else
            ./Reolens.app/Contents/MacOS/Reolens --smoke-test >"${OUT}" 2>&1 &
            PID=$!
            (sleep 30 && kill -0 "${PID}" 2>/dev/null && kill "${PID}") &
            WAITER=$!
            wait "${PID}" || EXIT=$?
            kill "${WAITER}" 2>/dev/null || true
          fi
          echo "==> smoke-test exit code: ${EXIT}"
          echo "----- BEGIN APP OUTPUT (with dyld traces) -----"
          # Tail the last 200 lines — DYLD_PRINT_LIBRARIES generates a
          # lot of output and the last few lines are the most useful.
          tail -200 "${OUT}" || echo "(no output captured)"
          echo "----- END APP OUTPUT -----"
          if [ "${EXIT}" -ne 0 ]; then
            echo "==> recent Reolens crash reports:"
            find ~/Library/Logs/DiagnosticReports/ -name 'Reolens*' -mmin -10 2>/dev/null \
              | head -3 \
              | while read -r f; do
                  echo "----- ${f} -----"
                  head -200 "${f}"
                  echo "----- end ${f} -----"
                done
            echo "==> system log (last 30s for the Reolens process)"
            log show --predicate 'process == "Reolens"' --last 30s --style compact 2>&1 | head -60 || true
          fi
          exit "${EXIT}"

      - name: Upload .app artifact
        uses: actions/upload-artifact@v7
        with:
          name: Reolens-app
          path: Reolens.app
          if-no-files-found: error

  # SwiftLint runs separately from the build so a style warning never
  # blocks code that compiles and tests cleanly. Failures still surface
  # in the PR check list — they just don't fail the whole pipeline.
  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --reporter github-actions-logging
        continue-on-error: true
