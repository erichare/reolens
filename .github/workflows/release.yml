name: Release

# Tag-driven release pipeline. Push `v0.1.0` (etc.) and this workflow:
#   1. Builds the .app bundle with Developer ID signing.
#   2. Submits it to Apple's notary service and staples the ticket.
#   3. Packages it into a styled DMG, signs + notarizes + staples the DMG.
#   4. Signs the DMG with Sparkle's EdDSA key and regenerates the appcast.
#   5. Commits the updated appcast.xml back to /docs (so GitHub Pages
#      serves https://reolens.io/appcast.xml fresh).
#   6. Creates a GitHub Release with the DMG + sha256 attached.
#
# Required secrets (configure under repo Settings → Secrets):
#   MACOS_CERTIFICATE_P12_BASE64 — base64 of the Developer ID Application
#                                  cert exported from Keychain as .p12
#   MACOS_CERTIFICATE_PASSWORD   — password for that .p12
#   KEYCHAIN_PASSWORD            — arbitrary password for the temporary
#                                  build keychain we create in CI
#   AC_API_KEY_ID                — App Store Connect API key ID
#   AC_API_ISSUER_ID             — App Store Connect issuer UUID
#   AC_API_KEY_P8_BASE64         — base64 of the .p8 key file
#   SPARKLE_ED_PRIVATE_KEY       — base64 of the EdDSA private key
#                                  (generated locally with Sparkle's
#                                  `generate_keys`; never commit the file)
#   SPARKLE_PUBLIC_KEY           — the matching public key (also stored
#                                  in Info.plist; we re-inject at build
#                                  time so dev builds can leave it blank)
#
# Required repo variables:
#   SIGNING_IDENTITY             — e.g. "Developer ID Application: Eric Hare (TEAM12345)"
#   TEAM_ID                      — the 10-char team ID

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write  # needed to create releases + push appcast back to /docs

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, notarize, publish
    runs-on: macos-26
    timeout-minutes: 60
    env:
      SIGNING_IDENTITY: ${{ vars.SIGNING_IDENTITY }}
      TEAM_ID: ${{ vars.TEAM_ID }}
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
      AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          # We need a real workdir (not detached HEAD) for the appcast
          # commit-back step at the end of the job.
          fetch-depth: 0

      - name: Select latest Xcode 26
        run: |
          # Skip beta Xcodes — their simulator runtimes aren't
          # preinstalled, which breaks actool even on device builds.
          # See the matching comment in ci.yml.
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -vi beta | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 26.x found on the runner image." >&2
            ls /Applications/ | grep -i Xcode || true
            exit 1
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          # GitHub's runner images preset BOTH `DEVELOPER_DIR` AND
          # PATH to the latest installed Xcode (often the beta).
          # `DEVELOPER_DIR` controls what xcodebuild does INTERNALLY
          # but not which `xcodebuild` binary gets executed in the
          # first place — that resolves via PATH. The runner's PATH
          # has Xcode_26.5_beta_2.app's bin dir first, so even with
          # the stable Xcode xcode-selected, `xcodebuild` (unqualified)
          # invokes the beta. Pin both env vars in $GITHUB_ENV so
          # every step + script in this job picks the right Xcode.
          echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
          echo "$XCODE_PATH/Contents/Developer/usr/bin" >> "$GITHUB_PATH"

      # AGENTS.md §13 (0.5.0): macOS + iOS MARKETING_VERSION must
      # align before a tag is allowed to release. Run this *before*
      # any signing happens — divergence here is a release-blocking
      # bug, full stop.
      - name: Verify macOS / iOS versions align
        run: ./Scripts/check-versions.sh

      - name: Import Developer ID signing cert
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="build.keychain"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security default-keychain -s "${KEYCHAIN}"
          security set-keychain-settings -lut 7200 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          echo "${P12_BASE64}" | base64 -D > /tmp/cert.p12
          security import /tmp/cert.p12 -k "${KEYCHAIN}" \
            -P "${P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f /tmp/cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"

      - name: Inject Sparkle public key into Info.plist
        env:
          SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :SUPublicEDKey ${SPARKLE_PUBLIC_KEY}" App/Info.plist

      # Scripts/build-app.sh's MAC_APP_DIRECT profile-fetch step calls
      # Scripts/asc_ensure_profile.py, which needs pyjwt + cryptography
      # to JWT-sign requests to the App Store Connect API. The iOS job
      # installs the same pair downstream.
      - name: Install Python deps for ASC profile fetch
        # macos-26 runner ships an older pip3 that doesn't recognize
        # `--break-system-packages` (pip < 23). Use a dedicated
        # venv instead so we sidestep PEP 668 entirely. The venv's
        # bin dir is prepended to PATH so the Scripts/asc_*.py
        # `#!/usr/bin/env python3` shebangs pick up the venv's
        # python3 (with pyjwt + cryptography importable) without
        # touching the system interpreter.
        run: |
          set -euo pipefail
          python3 -m venv /tmp/ascvenv
          /tmp/ascvenv/bin/pip install --quiet pyjwt cryptography
          echo "/tmp/ascvenv/bin" >> "$GITHUB_PATH"

      - name: Build app bundle (release, signed)
        run: ./Scripts/build-app.sh -c release

      - name: Notarize and staple .app
        run: ./Scripts/notarize.sh Reolens.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: ./Scripts/make-dmg.sh

      - name: Read version
        id: ver
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Reolens.app/Contents/Info.plist)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Notarize and staple DMG
        run: ./Scripts/notarize.sh dist/build/Reolens-${{ steps.ver.outputs.version }}.dmg

      # `notarytool ... staple` rewrites the DMG to embed the
      # notarization ticket, so any sha256 we computed before this step
      # (e.g. by Scripts/make-dmg.sh during local development) is now
      # stale. Recompute against the post-staple bytes — that's what
      # `brew install --cask` will see when it downloads the asset.
      # Also publish a version-less `Reolens.dmg` alias so the landing
      # page's "Download" button can permalink to
      # `/releases/latest/download/Reolens.dmg` and resolve forever.
      - name: Recompute DMG sha256 + publish version-less alias
        run: |
          set -euo pipefail
          DMG="dist/build/Reolens-${{ steps.ver.outputs.version }}.dmg"
          ALIAS="dist/build/Reolens.dmg"
          shasum -a 256 "${DMG}" | tee "${DMG}.sha256"
          cp "${DMG}" "${ALIAS}"

      - name: Install Sparkle tools
        run: |
          # The Sparkle XCFramework comes bundled with `sign_update` and
          # `generate_appcast`; SwiftPM puts them under .build/artifacts.
          SPARKLE_TOOLS=$(find .build/artifacts -type d -name 'Sparkle.xcframework' | head -n 1)
          echo "SPARKLE_TOOLS=${SPARKLE_TOOLS}/../bin" >> $GITHUB_ENV
          # Sparkle ships the CLI tools next to the XCFramework. Fall
          # back to brew if the artifact layout doesn't include them.
          if [ ! -f "${SPARKLE_TOOLS}/../bin/sign_update" ]; then
            brew install --quiet sparkle || true
          fi

      - name: Sign DMG with Sparkle EdDSA key
        id: ed
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          DMG="dist/build/Reolens-${{ steps.ver.outputs.version }}.dmg"
          KEY_FILE=$(mktemp)
          echo "${SPARKLE_ED_PRIVATE_KEY}" | base64 -D > "${KEY_FILE}"
          # `sign_update` lives either in the brew prefix or beside the
          # XCFramework; locate whichever exists.
          SIGN_BIN=$(command -v sign_update || find .build/artifacts -name 'sign_update' -type f | head -n 1)
          ED_SIG=$("${SIGN_BIN}" -f "${KEY_FILE}" "${DMG}")
          rm -f "${KEY_FILE}"
          echo "ed_signature=${ED_SIG}" >> $GITHUB_OUTPUT

      - name: Generate appcast.xml as a release asset
        env:
          ED_SIG: ${{ steps.ed.outputs.ed_signature }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          # Build the appcast at the repo root so it gets attached to
          # the GitHub Release as `appcast.xml`. Sparkle then reads it
          # via the /releases/latest/download/appcast.xml permalink —
          # see SUFeedURL in App/Info.plist. We deliberately do NOT
          # commit it back to main; the `chore(release)` push pattern
          # ran into the repo's branch-protection rule, which we want
          # to keep.
          DMG="dist/build/Reolens-${VERSION}.dmg"
          # Note: don't compute LENGTH here — `sign_update` already
          # emits both `length="..."` and `sparkle:edSignature="..."`
          # as part of ED_SIG. Adding our own length= produced a
          # duplicate XML attribute that broke Sparkle's parser
          # (v0.1.1 hotfix re-uploaded the asset directly).
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/Reolens-${VERSION}.dmg"
          cat > appcast.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Reolens</title>
              <link>https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml</link>
              <description>Reolens release feed</description>
              <language>en</language>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUBDATE}</pubDate>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <description><![CDATA[See <a href="https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md">CHANGELOG</a> for full release notes.]]></description>
                <enclosure
                  url="${URL}"
                  type="application/octet-stream"
                  ${ED_SIG} />
              </item>
            </channel>
          </rss>
          EOF
          echo "Generated appcast.xml ($(wc -c < appcast.xml) bytes)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Reolens ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist/build/Reolens-${{ steps.ver.outputs.version }}.dmg
            dist/build/Reolens-${{ steps.ver.outputs.version }}.dmg.sha256
            dist/build/Reolens.dmg
            appcast.xml

  # iOS TestFlight upload. Runs in parallel with the macOS `release` job;
  # the two are independent. Reuses the App Store Connect API key the
  # macOS job already uses for notarization (`AC_API_KEY_*` secrets);
  # the key is scoped to the team, not a single app, so it covers both
  # platforms' uploads as long as it has Admin role (required by
  # xcodebuild for provisioning-profile auto-creation).
  #
  # Prereqs (one-time, done in App Store Connect UI):
  #   - Bundle ID com.reolens.Reolens.iOS registered under Identifiers.
  #   - An app record created under My Apps with that bundle ID.
  #   - The ASC API key has Admin role.
  #
  # See docs/IOS_RELEASE.md for the full walkthrough.
  ios-testflight:
    name: iOS TestFlight upload
    runs-on: macos-26
    timeout-minutes: 30
    env:
      AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
      AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
      AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
      # 0.5.0 — Apple Distribution cert + private key for iOS
      # signing. Without this, `xcodebuild archive` fails with
      # "Provisioning profile does not include signing certificate"
      # because the runner has no usable identity for the bundle
      # the profile references.
      #
      # Two paths:
      #   1. Set IOS_CERTIFICATE_P12_BASE64 (+ IOS_CERTIFICATE_PASSWORD)
      #      to a dedicated iOS-only .p12.
      #   2. Reuse MACOS_CERTIFICATE_P12_BASE64 if the maintainer's
      #      .p12 already contains BOTH identities (common when the
      #      .p12 was exported from Keychain with all identities
      #      selected).
      #
      # The "Import iOS signing cert" step below tries the dedicated
      # secret first, falls back to the macOS one.
      IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
      IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      TEAM_ID: ${{ vars.TEAM_ID }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}

      # The iOS job uses Xcode 26.3 (latest on the macos-15 image) — it
      # ships iOS 26 SDK *and* the iOS device platform pre-installed.
      # The macOS `release` job above uses Xcode 16, which has been
      # working for the Mac DMG flow, so we don't touch it.
      #
      # We previously tried `Xcode_16.app` (16.0 — the oldest available
      # on the runner) which omits the iOS device platform. The
      # alternative `xcodebuild -downloadPlatform iOS` fails on this
      # runner with "Unable to connect to simulator" — a known issue
      # where the downloader's progress reporter can't start
      # CoreSimulator. Picking a pre-stocked Xcode dodges all of that.
      - name: Select latest Xcode 26
        run: |
          # Skip beta Xcodes — their simulator runtimes aren't
          # preinstalled, which breaks actool even on device builds.
          # See the matching comment in ci.yml.
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -vi beta | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "No Xcode 26.x found on the runner image." >&2
            ls /Applications/ | grep -i Xcode || true
            exit 1
          fi
          echo "Selecting $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          # GitHub's runner images preset BOTH `DEVELOPER_DIR` AND
          # PATH to the latest installed Xcode (often the beta).
          # `DEVELOPER_DIR` controls what xcodebuild does INTERNALLY
          # but not which `xcodebuild` binary gets executed in the
          # first place — that resolves via PATH. The runner's PATH
          # has Xcode_26.5_beta_2.app's bin dir first, so even with
          # the stable Xcode xcode-selected, `xcodebuild` (unqualified)
          # invokes the beta. Pin both env vars in $GITHUB_ENV so
          # every step + script in this job picks the right Xcode.
          echo "DEVELOPER_DIR=$XCODE_PATH/Contents/Developer" >> "$GITHUB_ENV"
          echo "$XCODE_PATH/Contents/Developer/usr/bin" >> "$GITHUB_PATH"

      - name: Show available iOS SDKs (diagnostic)
        run: xcodebuild -showsdks | grep -i ios

      # The Apple Distribution certificate (the one that signs App
      # Store / TestFlight builds) only exists in the maintainer's
      # local Keychain — Apple doesn't redistribute it from the
      # developer portal once it's been issued. Without it, xcodebuild's
      # manual signing step errors with:
      #
      #   error: No signing certificate "iOS Distribution" found:
      #   No "iOS Distribution" signing certificate matching team ID
      #   "5M9UT7VQ8Q" with a private key was found.
      #
      # Same .p12-import pattern as the macOS Developer ID step in the
      # release job above, just with iOS-named secrets so the two
      # certs don't get confused with each other (different cert types,
      # different distribution channels, intentionally separate).
      - name: Import Apple Distribution signing cert
        env:
          P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="ios-build.keychain"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security default-keychain -s "${KEYCHAIN}"
          security set-keychain-settings -lut 7200 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          echo "${P12_BASE64}" | base64 -D > /tmp/ios-cert.p12
          security import /tmp/ios-cert.p12 -k "${KEYCHAIN}" \
            -P "${P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f /tmp/ios-cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          # Diagnostic — confirm the identity is now visible.
          security find-identity -v -p codesigning "${KEYCHAIN}" | grep -i "Apple Distribution" || {
              echo "::error::Apple Distribution identity not visible after import" >&2
              exit 1
          }

      # 0.5.0 — Import a signing cert into the runner keychain so
      # xcodebuild has the private key matching the Apple
      # Distribution cert that the provisioning profile references.
      # Without this, `xcodebuild -allowProvisioningUpdates` can't
      # produce a signed archive — the profile says "use cert X" but
      # the keychain has no key for cert X.
      #
      # Prefers a dedicated IOS_CERTIFICATE_P12_BASE64 secret, falls
      # back to MACOS_CERTIFICATE_P12_BASE64 (works when the
      # maintainer exported both identities into a single .p12 from
      # Keychain Access). Skips silently if neither is present —
      # build still tries with API-key-only signing.
      - name: Import iOS signing cert
        run: |
          set -euo pipefail
          if [[ -n "${IOS_CERTIFICATE_P12_BASE64:-}" ]]; then
            P12_BASE64="${IOS_CERTIFICATE_P12_BASE64}"
            P12_PASSWORD="${IOS_CERTIFICATE_PASSWORD:-}"
            echo "==> Importing IOS_CERTIFICATE_P12_BASE64 into runner keychain"
          elif [[ -n "${MACOS_CERTIFICATE_P12_BASE64:-}" ]]; then
            P12_BASE64="${MACOS_CERTIFICATE_P12_BASE64}"
            P12_PASSWORD="${MACOS_CERTIFICATE_PASSWORD:-}"
            echo "==> Falling back to MACOS_CERTIFICATE_P12_BASE64 (may contain both identities)"
          else
            echo "==> No iOS cert secret set — skipping import."
            echo "    If signing fails, add IOS_CERTIFICATE_P12_BASE64 +"
            echo "    IOS_CERTIFICATE_PASSWORD secrets."
            exit 0
          fi
          KEYCHAIN="build.keychain"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          security default-keychain -s "${KEYCHAIN}"
          security set-keychain-settings -lut 7200 "${KEYCHAIN}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"
          echo "${P12_BASE64}" | base64 -D > /tmp/ios-cert.p12
          security import /tmp/ios-cert.p12 -k "${KEYCHAIN}" \
            -P "${P12_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm -f /tmp/ios-cert.p12
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN}"

      # Diagnostic — print every codesigning identity the keychain
      # exposes to xcodebuild. We can correlate this output against
      # the certs visible in developer.apple.com to confirm the
      # profile's cert is reachable.
      - name: Dump available codesigning identities (diagnostic)
        run: |
          echo "==> Codesigning identities in default keychain:"
          security find-identity -v -p codesigning || true

      - name: Install xcodegen
        run: brew install xcodegen

      # PyJWT + cryptography power the pre-flight ASC API check in
      # Scripts/build-ios.sh. Without them the script skips the check
      # and we lose the diagnostic, falling back on xcodebuild's
      # generic "Authentication failed" if the key is misconfigured.
      - name: Install Python deps for pre-flight diagnostic
        # macos-26 runner ships pip < 23 (no --break-system-packages).
        # Install via a venv and prepend its bin dir to PATH so the
        # Python shebangs pick up the venv's python3 + modules.
        run: |
          set -euo pipefail
          python3 -m venv /tmp/ascvenv
          /tmp/ascvenv/bin/pip install --quiet pyjwt cryptography
          echo "/tmp/ascvenv/bin" >> "$GITHUB_PATH"

      - name: Bump CURRENT_PROJECT_VERSION to GitHub run number
        # MARKETING_VERSION stays at whatever the spec says (0.2.0, etc.);
        # CURRENT_PROJECT_VERSION must monotonically increase per upload
        # — App Store Connect rejects duplicates. Using ${GITHUB_RUN_NUMBER}
        # gives us a stable, increasing integer without committing back.
        run: |
          set -euo pipefail
          sed -i.bak "s/CURRENT_PROJECT_VERSION: \"1\"/CURRENT_PROJECT_VERSION: \"${GITHUB_RUN_NUMBER}\"/" AppiOS/project.yml
          rm AppiOS/project.yml.bak

      - name: Build + upload to TestFlight
        run: ./Scripts/build-ios.sh upload
