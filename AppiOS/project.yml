name: ReolensiOS
options:
  bundleIdPrefix: com.reolens
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_HARDENED_RUNTIME: YES
packages:
  Reolens:
    path: ..
targets:
  ReolensiOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Sources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: Reolens
        CFBundleShortVersionString: "0.4.1"
        CFBundleVersion: "5"
        # iOS 11+ requires apps using asset-catalog icons to also
        # declare CFBundleIconName so the OS / App Store knows which
        # icon set to consult at runtime. Without this key, ASC's
        # validator rejects the upload with:
        #   Validation failed (409) Missing Info.plist value.
        #   A value for the Info.plist key 'CFBundleIconName' is missing
        # The matching ASSETCATALOG_COMPILER_APPICON_NAME below tells
        # the build to put an "AppIcon" name in the asset catalog.
        CFBundleIconName: AppIcon
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Required for any LAN scan / Bonjour discovery on iOS 14+. Without
        # this string the OS silently denies discovery and RTSP connections
        # to camera IPs on the local network.
        NSLocalNetworkUsageDescription: "Reolens connects to Reolink cameras on your local Wi-Fi network for live view and recordings."
        NSBonjourServices:
          - _http._tcp
          - _rtsp._tcp
        # Talkback (two-way audio) records mic and streams it to the camera
        # over Baichuan MSG_ID_TALK. Audio background mode lets a single
        # live-view tile keep its stream open while the app is backgrounded
        # (PiP picks this up too).
        NSMicrophoneUsageDescription: "Reolens uses the microphone to talk back through your Reolink camera's two-way audio."
        # Save Snapshot writes the latest decoded camera frame into the
        # Photos library. We request the add-only authorization
        # (PHPhotoLibrary.requestAuthorization(for: .addOnly)) so Reolens
        # only ever inserts photos — never reads the user's library.
        NSPhotoLibraryAddUsageDescription: "Reolens saves snapshots of your camera feeds to Photos when you tap Save Snapshot."
        UIBackgroundModes:
          - audio
          # remote-notification (0.4.1) — required so CloudKit silent
          # pushes wake the app's `didReceiveRemoteNotification`
          # handler. The CloudKit motion-event relay (publisher on a
          # paired Mac, subscriber here) needs this to deliver
          # notifications while the iOS app is closed. AGENTS.md §5 —
          # the relay rides Apple's CloudKit under the user's own
          # iCloud account, not a Reolens server.
          - remote-notification
        # Continuity / Handoff: the user can start a camera on Mac and
        # hand off to iPhone/iPad (and vice-versa). The activity type
        # matches `CameraContinuity.cameraDetailActivityType` in
        # AppShared. AGENTS.md §11: the payload carries only the
        # camera UUID + channel index — no hostnames, no credentials.
        NSUserActivityTypes:
          - io.reolens.camera-detail
        # Custom drag-and-drop UTIs for in-app reordering (channels in
        # the grid, devices in the sidebar). Exported with a custom
        # namespace so the payloads can't be consumed by other apps.
        UTExportedTypeDeclarations:
          - UTTypeIdentifier: com.reolens.channelDrag
            UTTypeDescription: Reolens channel drag payload
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification: {}
          - UTTypeIdentifier: com.reolens.deviceDrag
            UTTypeDescription: Reolens device drag payload
            UTTypeConformsTo:
              - public.data
            UTTypeTagSpecification: {}
        # Reolink cameras on LAN serve HTTP/HTTPS with self-signed certs.
        # Matches the macOS app's ATS exception; both are limited to local
        # networking — no public-Internet HTTP traffic is intended.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Resources/ReolensiOS.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.reolens.Reolens"
        com.apple.developer.ubiquity-container-identifiers:
          - "iCloud.com.reolens.Reolens"
        com.apple.developer.icloud-services:
          - CloudDocuments
          # CloudKit (0.4.1) — motion-event relay uses the private
          # CloudKit database. Same container as the iCloud Drive
          # sync, different services within it.
          - CloudKit
        # APNS environment for receiving CloudKit silent pushes.
        # Production for App Store / TestFlight builds; xcodegen
        # automatically swaps in development for debug archives.
        aps-environment: production
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.reolens.Reolens.iOS
        PRODUCT_NAME: Reolens
        MARKETING_VERSION: "0.4.1"
        CURRENT_PROJECT_VERSION: "5"
        # Same Apple Developer team as the macOS app. Xcode's automatic
        # signing uses this to fetch / create the Apple Distribution
        # certificate and the App Store provisioning profile on first
        # archive. CI overrides via -allowProvisioningUpdates anyway.
        DEVELOPMENT_TEAM: 5M9UT7VQ8Q
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Reolens
        product: ReolinkAPI
      - package: Reolens
        product: ReolinkStreaming
      - package: Reolens
        product: ReolinkBaichuan
      - package: Reolens
        product: AppShared
